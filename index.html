<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 경제 모의주식투자 게임 | KSE</title>
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js 라이브러리 추가 (차트 구현용) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="app">
        <!-- 상단 헤더 -->
        <header class="header">
            <div class="logo-container">
                <span class="logo-text-sub">KSE</span>
                <h1 class="logo-text-main">Korea Stock Exchange</h1>
            </div>
            <div class="round-info">
                <span id="current-round">ROUND 1</span>
            </div>
        </header>

        <!-- 뉴스 전광판 -->
        <section class="news-ticker">
            <div class="ticker-label">📰 속보</div>
            <div class="ticker-content">
                <p id="news-text">미국-이란 긴장 고조, 호르무즈 해협 봉쇄 위기...</p>
            </div>
        </section>

        <!-- 메인 컨텐츠 영역 -->
        <main class="main-content">
            <!-- 자산 현황 섹션 -->
            <section class="asset-summary">
                <div class="asset-item">
                    <span class="label">보유 현금</span>
                    <span id="balance" class="value">100,000,000원</span>
                </div>
                <div class="asset-item highlight">
                    <span class="label">총 자산</span>
                    <span id="total-assets" class="value">100,000,000원</span>
                </div>
                <div class="asset-item">
                    <span class="label">수익률</span>
                    <span id="total-profit-rate" class="value percent-zero">0.00%</span>
                </div>
            </section>

            <!-- 주식 리스트 섹션 -->
            <section class="stock-list-container">
                <h2 class="section-title">관심 종목</h2>
                <div id="stock-list" class="stock-list">
                    <!-- 스크립트에서 동적으로 생성될 예정입니다 -->
                    <div class="stock-item loading">데이터를 불러오는 중...</div>
                </div>
            </section>
        </main>

        <!-- 하단 탭 바 (모바일 대응 UI) -->
        <nav class="bottom-nav">
            <button class="nav-item active" onclick="showView('home')">홈</button>
            <button class="nav-item" onclick="showView('portfolio')">내 주식</button>
            <button class="nav-item" onclick="showView('ranking')">랭킹</button>
            <button class="nav-item" onclick="location.href='admin.html'">관리자</button>
        </nav>

        <!-- 매수/매도 모달 (팝업) -->
        <div id="trade-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modal-stock-name">삼성전자</h3>
                    <button class="close-btn" onclick="closeModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="price-info">
                        <span class="label">현재가</span>
                        <span id="modal-stock-price" class="value">0원</span>
                    </div>
                    <div class="chart-container">
                        <canvas id="stock-chart"></canvas>
                    </div>
                    <div class="trade-inputs">
                        <div class="input-group">
                            <label for="trade-quantity">수량</label>
                            <input type="number" id="trade-quantity" min="1" value="1">
                        </div>
                        <div class="total-price">
                            <span>예상 결제 금액: </span>
                            <span id="expected-price">0원</span>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-buy" onclick="executeTrade('buy')">매수</button>
                    <button class="btn-sell" onclick="executeTrade('sell')">매도</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 데이터 및 로직 스크립트 -->
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
