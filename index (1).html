<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 실시간 모의주식투자 게임 | KSE</title>
    <link rel="stylesheet" href="style.css">
    <!-- 스크립트 최적화: defer 속성으로 비동기 로딩 -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="data.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>
    <!-- 로딩 인디케이터 (초기 화면) -->
    <div id="loading-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; display:flex; justify-content:center; align-items:center;">
        <div style="text-align:center;">
            <div class="logo-text-sub" style="color:#3182f6; font-weight:bold;">KSE</div>
            <div style="font-size:20px; font-weight:bold; margin-top:10px;">데이터 로딩 중...</div>
        </div>
    </div>

    <!-- 닉네임 입력 인트로 화면 -->
    <div id="intro-overlay" class="intro-overlay" style="display:none;">
        <div class="intro-content">
            <div class="logo-container large">
                <span class="logo-text-sub">KSE REALTIME</span>
                <h1 class="logo-text-main">Korea Stock Exchange</h1>
            </div>
            <p class="intro-desc">관리자의 통제에 따라 실시간으로 진행되는<br>2026 경제 모의주식투자 게임입니다.</p>
            <div class="nickname-input-group">
                <input type="text" id="nickname-input" placeholder="닉네임 입력 (최대 8자)" maxlength="8">
                <button onclick="startGame()" class="btn-start">게임 참가하기</button>
            </div>
        </div>
    </div>

    <div id="app" style="display: none;">
        <header class="header">
            <div class="logo-container">
                <span class="logo-text-sub">KSE</span>
                <h1 class="logo-text-main">Korea Stock Exchange</h1>
            </div>
            <div class="header-right">
                <span id="user-nickname" class="user-nickname">닉네임</span>
                <div class="round-info">
                    <span id="current-round">ROUND -</span>
                </div>
            </div>
        </header>

        <section class="news-ticker">
            <div class="ticker-label">📰 속보</div>
            <div class="ticker-content">
                <p id="news-text">관리자가 라운드를 시작할 때까지 기다려주세요...</p>
            </div>
        </section>

        <main class="main-content">
            <section class="asset-summary">
                <div class="asset-item">
                    <span class="label">보유 현금</span>
                    <span id="balance" class="value">0원</span>
                </div>
                <div class="asset-item highlight">
                    <span class="label">총 자산</span>
                    <span id="total-assets" class="value">0원</span>
                </div>
                <div class="asset-item">
                    <span class="label">수익률</span>
                    <span id="total-profit-rate" class="value percent-zero">0.00%</span>
                </div>
            </section>

            <section class="stock-list-container">
                <div class="section-header">
                    <h2 class="section-title">관심 종목</h2>
                    <span id="market-status" class="market-status">시장 열림</span>
                </div>
                <div id="stock-list" class="stock-list">
                    <!-- 로컬 데이터로 먼저 채워짐 -->
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" onclick="showView('home')">홈</button>
            <button class="nav-item" onclick="showView('portfolio')">내 주식</button>
            <button class="nav-item" onclick="showView('ranking')">실시간 랭킹</button>
            <button class="nav-item" onclick="location.href='admin.html'">관리자</button>
        </nav>

        <div id="trade-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modal-stock-name">주식명</h3>
                    <button class="close-btn" onclick="closeModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="price-info">
                        <span class="label">현재가</span>
                        <span id="modal-stock-price" class="value">0원</span>
                    </div>
                    <div class="chart-container">
                        <canvas id="stock-chart"></canvas>
                    </div>
                    <div class="trade-inputs">
                        <div class="input-group">
                            <label for="trade-quantity">수량</label>
                            <input type="number" id="trade-quantity" min="1" value="1">
                        </div>
                        <div class="total-price">
                            <span>예상 결제 금액: </span>
                            <span id="expected-price">0원</span>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-buy" onclick="executeTrade('buy')">매수</button>
                    <button class="btn-sell" onclick="executeTrade('sell')">매도</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
